<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界風景 · World Scenery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #f0c040;
      --dark: #0d0d0d;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
    }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--dark);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 全螢幕背景輪播 ── */
    #bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.6s ease-in-out, transform 8s ease-in-out;
      transform: scale(1.06);
    }

    .bg-slide.active {
      opacity: 1;
      transform: scale(1);
    }

    /* 漸層遮罩 */
    #overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.10) 40%,
        rgba(0,0,0,0.55) 100%
      );
      z-index: 1;
    }

    /* ── 頂部標題列 ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 36px;
      backdrop-filter: blur(6px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.45), transparent);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo span.dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }

    .auto-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      letter-spacing: 1px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 6px 14px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: background 0.2s;
    }

    .auto-badge:hover { background: rgba(255,255,255,0.15); }

    .auto-badge .indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      transition: background 0.3s;
    }

    .auto-badge.paused .indicator { background: #f44336; }

    /* ── 推播通知卡片 ── */
    #notification-stack {
      position: fixed;
      top: 90px;
      right: 28px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 320px;
      pointer-events: none;
    }

    .notif-card {
      background: rgba(20, 20, 20, 0.78);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 14px 16px;
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: all;
      transform: translateX(140%);
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.5s;
      cursor: pointer;
    }

    .notif-card.show {
      transform: translateX(0);
      opacity: 1;
    }

    .notif-card.hide {
      transform: translateX(140%);
      opacity: 0;
    }

    .notif-thumb {
      width: 52px; height: 52px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }

    .notif-body { flex: 1; overflow: hidden; }

    .notif-title {
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .notif-name {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notif-desc {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
    }

    /* ── 底部資訊 & 控制 ── */
    #info-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 28px 40px 34px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    }

    .location-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .location-tag svg { width: 13px; height: 13px; fill: var(--accent); }

    #slide-title {
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 6px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.6);
      transition: opacity 0.6s;
    }

    #slide-desc {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.65);
      max-width: 560px;
      line-height: 1.6;
      transition: opacity 0.6s;
    }

    /* 控制列 */
    .controls {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: 22px;
    }

    .ctrl-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      color: #fff;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }

    .ctrl-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* 進度點 */
    #dots {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 6px;
    }

    .dot-item {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dot-item.active {
      background: var(--accent);
      transform: scale(1.45);
    }

    /* 進度條 */
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      z-index: 30;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* 幻燈片計數 */
    .counter {
      margin-left: auto;
      font-size: 0.72rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
    }

    /* 全螢幕按鈕 */
    #fullscreen-btn {
      position: fixed;
      top: 22px;
      right: 36px;
      z-index: 15;
    }

    /* ── 搜尋列 ── */
    #search-bar {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      display: flex;
      gap: 8px;
      width: min(560px, calc(100vw - 40px));
    }

    #search-input {
      flex: 1;
      padding: 10px 18px;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #search-input::placeholder { color: rgba(255,255,255,0.4); }
    #search-input:focus {
      border-color: var(--accent);
      background: rgba(0,0,0,0.7);
    }

    #search-btn {
      padding: 10px 20px;
      border-radius: 24px;
      border: none;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    #search-btn:hover { opacity: 0.85; transform: scale(1.04); }
    #search-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* 搜尋結果數量選擇器 */
    #search-count {
      padding: 10px 12px;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      color: #fff;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    #search-count option { background: #111; }

    /* 搜尋中載入指示 */
    .search-loading #search-btn::after {
      content: '';
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 搜尋結果標籤（slide biome label 變體） */
    .biome-chip.search-active {
      background: #60c8ff;
      color: #000;
      border-color: #60c8ff;
      font-weight: 700;
    }

    /* ── 生態域篩選列 ── */
    #biome-filter {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .biome-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(10px);
      font-size: 0.72rem;
      font-family: inherit;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .biome-chip:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
    }

    .biome-chip.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    /* 生態域小標籤（顯示於地區旁） */
    #slide-biome-label {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 1px 8px;
      font-size: 0.68rem;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* 隨機推播通知變體 */
    .notif-card.notif-random {
      border-left: 3px solid #60c8ff;
    }
    .notif-card.notif-random .notif-title {
      color: #60c8ff;
    }

    /* ── 響應式 ── */
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      #info-bar { padding: 20px 20px 28px; }
      #notification-stack { width: calc(100vw - 40px); right: 20px; top: 80px; }
      #slide-title { font-size: 1.8rem; }
      #biome-filter { gap: 5px; }
      .biome-chip { font-size: 0.68rem; padding: 4px 10px; }
    }
  </style>
</head>
<body>

<!-- 背景輪播 -->
<div id="bg-container"></div>
<div id="overlay"></div>

<!-- 頂部 -->
<header>
  <div class="logo">
    <span class="dot"></span>
    World Scenery
  </div>
  <div class="auto-badge" id="auto-badge" onclick="toggleAuto()">
    <span class="indicator"></span>
    <span id="auto-label">自動播放中</span>
  </div>
</header>

<!-- 搜尋列 -->
<div id="search-bar">
  <input id="search-input" type="text" placeholder="🔍 輸入關鍵字搜尋風景照片（英文更佳）…" maxlength="80" />
  <select id="search-count" title="搜尋結果數量">
    <option value="4">4 張</option>
    <option value="6" selected>6 張</option>
    <option value="10">10 張</option>
    <option value="16">16 張</option>
  </select>
  <button id="search-btn" onclick="doSearch()">搜尋</button>
</div>

<!-- 推播通知 -->
<div id="notification-stack"></div>

<!-- 底部資訊 -->
<div id="info-bar">
  <div id="biome-filter"></div>
  <div class="location-tag">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
    <span id="slide-region">Loading...</span>
    <span id="slide-biome-label"></span>
  </div>
  <div id="slide-title">載入中...</div>
  <div id="slide-desc">準備帶您環遊世界</div>

  <div class="controls">
    <button class="ctrl-btn" onclick="prevSlide()" title="上一張">
      <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
    </button>
    <button class="ctrl-btn" onclick="nextSlide()" title="下一張">
      <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
    </button>
    <button class="ctrl-btn" onclick="randomJump()" title="隨機跳轉 (R)">
      <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
    </button>
    <div id="dots"></div>
    <div class="counter"><span id="cur-num">1</span> / <span id="total-num">1</span></div>
  </div>
</div>

<!-- 底部進度條 -->
<div id="progress-bar"></div>

<!-- 核心邏輯模組（純函式＋景點資料） -->
<script src="src/slideshow.js"></script>

<script>
  // ── 常數 ──
  const RANDOM_NOTIF_INTERVAL = 15000; // 每 15 秒隨機推播一次

  // ── 狀態 ──
  let activeFilter = 'all';
  let filteredIndices = [];   // SCENES_DATA 中符合篩選的索引清單
  let currentPos = 0;         // 在 filteredIndices 中的位置
  let isAuto = true;
  let timer = null;
  let progressTimer = null;
  let progressValue = 0;
  let randomNotifTimer = null;

  // ── DOM refs ──
  const bgContainer = document.getElementById('bg-container');
  const dotsEl = document.getElementById('dots');
  const totalNumEl = document.getElementById('total-num');
  const curNumEl = document.getElementById('cur-num');
  const progressBar = document.getElementById('progress-bar');
  const notifStack = document.getElementById('notification-stack');
  const biomeFilterEl = document.getElementById('biome-filter');

  // ── 預先建立所有背景 slide（全部景點） ──
  const bgSlides = SCENES_DATA.map(s => {
    const el = document.createElement('div');
    el.className = 'bg-slide';
    el.style.backgroundImage = `url('${s.img}')`;
    bgContainer.appendChild(el);
    return el;
  });

  // ── 建立生態域篩選 chips ──
  BIOMES.forEach(b => {
    const chip = document.createElement('button');
    chip.className = 'biome-chip' + (b.key === 'all' ? ' active' : '');
    chip.dataset.biome = b.key;
    if (b.key === 'all') {
      chip.textContent = `${b.emoji} ${b.label}`;
    } else {
      const count = SCENES_DATA.filter(s => s.biome === b.key).length;
      chip.textContent = `${b.emoji} ${b.label} (${count})`;
    }
    chip.onclick = () => setFilter(b.key);
    biomeFilterEl.appendChild(chip);
  });

  // ── 篩選設定 ──
  function setFilter(biomeKey) {
    const scenes = window.SCENES_DATA || SCENES_DATA;
    activeFilter = biomeKey;
    filteredIndices = biomeKey === 'all'
      ? scenes.map((_, i) => i)
      : scenes.reduce((acc, s, i) => { if (s.biome === biomeKey) acc.push(i); return acc; }, []);

    document.querySelectorAll('.biome-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.biome === biomeKey);
    });

    currentPos = 0;
    rebuildDots();
    renderSlide(false);
  }

  // ── 進度點 ──
  function rebuildDots() {
    dotsEl.innerHTML = '';
    filteredIndices.forEach((_, pos) => {
      const d = document.createElement('div');
      d.className = 'dot-item';
      d.onclick = () => goToPos(pos);
      dotsEl.appendChild(d);
    });
    totalNumEl.textContent = filteredIndices.length;
  }

  function updateDotActive() {
    Array.from(dotsEl.children).forEach((d, i) => {
      d.classList.toggle('active', i === currentPos);
    });
    curNumEl.textContent = currentPos + 1;
  }

  // ── 渲染目前幻燈片 ──
  function renderSlide(withNotif) {
    const globalIdx = filteredIndices[currentPos];
    bgSlides.forEach((sl, i) => sl.classList.toggle('active', i === globalIdx));

    const s = (window.SCENES_DATA || SCENES_DATA)[globalIdx];
    document.getElementById('slide-region').textContent = s.region;
    document.getElementById('slide-title').textContent = s.title;
    document.getElementById('slide-desc').textContent = s.desc;

    const biome = BIOMES.find(b => b.key === s.biome);
    document.getElementById('slide-biome-label').textContent = biome ? `${biome.emoji} ${biome.label}` : '';

    updateDotActive();
    resetProgress();
    if (withNotif) showSlideNotification(globalIdx);
  }

  function goToPos(pos, withNotif = true) {
    currentPos = ((pos % filteredIndices.length) + filteredIndices.length) % filteredIndices.length;
    renderSlide(withNotif);
  }

  function nextSlide() { goToPos(currentPos + 1); }
  function prevSlide() { goToPos(currentPos - 1); }

  function randomJump() {
    if (filteredIndices.length < 2) return;
    const others = filteredIndices.map((_, i) => i).filter(i => i !== currentPos);
    goToPos(others[Math.floor(Math.random() * others.length)]);
  }

  // ── 自動播放 ──
  function startAuto() {
    clearInterval(timer);
    timer = setInterval(nextSlide, DEFAULT_INTERVAL);
  }

  function stopAuto() { clearInterval(timer); clearInterval(progressTimer); }

  function toggleAuto() {
    isAuto = !isAuto;
    const badge = document.getElementById('auto-badge');
    const label = document.getElementById('auto-label');
    if (isAuto) {
      badge.classList.remove('paused');
      label.textContent = '自動播放中';
      startAuto();
      startProgress();
    } else {
      badge.classList.add('paused');
      label.textContent = '已暫停';
      stopAuto();
    }
  }

  // ── 進度條 ──
  function resetProgress() {
    clearInterval(progressTimer);
    progressValue = 0;
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    if (isAuto) requestAnimationFrame(startProgress);
  }

  function startProgress() {
    clearInterval(progressTimer);
    const step = 100 / (DEFAULT_INTERVAL / 100);
    progressBar.style.transition = 'width 0.1s linear';
    progressTimer = setInterval(() => {
      progressValue += step;
      if (progressValue >= 100) { progressValue = 100; clearInterval(progressTimer); }
      progressBar.style.width = progressValue + '%';
    }, 100);
  }

  // ── 通知系統 ──
  let notifQueue = [];
  let notifShowing = false;

  function showSlideNotification(globalIdx) {
    notifQueue.push({ scene: (window.SCENES_DATA || SCENES_DATA)[globalIdx], type: 'slide' });
    if (!notifShowing) processNotifQueue();
  }

  // 隨機推播：從目前篩選的景點中隨機選一個（排除目前）
  function triggerRandomPush() {
    if (filteredIndices.length < 2) return;
    const candidates = filteredIndices.filter((_, i) => i !== currentPos);
    const targetGlobal = candidates[Math.floor(Math.random() * candidates.length)];
    const targetPos = filteredIndices.indexOf(targetGlobal);
    notifQueue.push({ scene: (window.SCENES_DATA || SCENES_DATA)[targetGlobal], type: 'random', targetPos });
    if (!notifShowing) processNotifQueue();
  }

  function processNotifQueue() {
    if (notifQueue.length === 0) { notifShowing = false; return; }
    notifShowing = true;
    const item = notifQueue.shift();
    const { scene: s, type, targetPos } = item;

    while (notifStack.children.length >= 3) {
      const oldest = notifStack.firstElementChild;
      oldest.classList.add('hide');
      setTimeout(() => oldest.remove(), 500);
    }

    const card = document.createElement('div');
    card.className = 'notif-card' + (type === 'random' ? ' notif-random' : '');
    card.innerHTML = `
      <div class="notif-thumb" style="background-image:url('${s.thumb}')"></div>
      <div class="notif-body">
        <div class="notif-title">${type === 'random' ? '🎲 探索推薦' : '📍 ' + s.region}</div>
        <div class="notif-name">${s.title}</div>
        <div class="notif-desc">${type === 'random' ? s.region : '點擊停留此景點'}</div>
      </div>
    `;
    card.onclick = () => {
      if (type === 'random') goToPos(targetPos, false); // 無聲跳轉不觸發新通知
      isAuto = false;
      document.getElementById('auto-badge').classList.add('paused');
      document.getElementById('auto-label').textContent = '已暫停';
      stopAuto();
      dismissCard(card);
    };
    notifStack.appendChild(card);
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('show')));

    setTimeout(() => {
      dismissCard(card);
      setTimeout(processNotifQueue, 300);
    }, 4000);
  }

  function dismissCard(card) {
    card.classList.remove('show');
    card.classList.add('hide');
    setTimeout(() => { if (card.parentNode) card.remove(); }, 500);
  }

  // ── 隨機推播計時器 ──
  function startRandomPush() {
    clearInterval(randomNotifTimer);
    randomNotifTimer = setInterval(triggerRandomPush, RANDOM_NOTIF_INTERVAL);
  }

  // ── 鍵盤快捷鍵 ──
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
    if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
    if (e.key === 'r' || e.key === 'R') randomJump();
  });

  // ── 觸控滑動 ──
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) dx < 0 ? nextSlide() : prevSlide();
  });

  // ── 搜尋功能 ──
  let isSearchMode = false;

  async function doSearch() {
    const keyword = document.getElementById('search-input').value.trim();
    if (!keyword) {
      document.getElementById('search-input').focus();
      return;
    }
    const count = parseInt(document.getElementById('search-count').value, 10);
    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    document.getElementById('search-bar').classList.add('search-loading');

    try {
      const newScenes = await fetchRandomScenes(keyword, count, activeFilter === 'all' ? 'mountain' : activeFilter);

      // 移除之前的搜尋結果，插入新的
      const baseScenes = window._baseScenes || SCENES_DATA;
      const merged = baseScenes.filter(s => !s.isSearchResult).concat(newScenes);
      window._dynamicScenes = merged;

      // 重建 bgSlides：只補新圖，不重建已有的
      newScenes.forEach(s => {
        const el = document.createElement('div');
        el.className = 'bg-slide';
        el.style.backgroundImage = `url('${s.img}')`;
        bgContainer.appendChild(el);
        bgSlides.push(el);
      });

      // 以新資料集取代 SCENES_DATA 參考
      Object.defineProperty(window, 'SCENES_DATA', { value: merged, writable: true, configurable: true });

      isSearchMode = true;
      activeFilter = 'all';

      // 重建 biome chips 計數（包含搜尋結果）
      rebuildBiomeChips();
      setFilter('all');

      // 跳至第一張搜尋結果
      const firstSearchPos = filteredIndices.findIndex(i => merged[i] && merged[i].isSearchResult);
      if (firstSearchPos >= 0) goToPos(firstSearchPos, false);
    } finally {
      btn.disabled = false;
      document.getElementById('search-bar').classList.remove('search-loading');
    }
  }

  // Enter 鍵觸發搜尋
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function rebuildBiomeChips() {
    biomeFilterEl.innerHTML = '';
    const currentScenes = window.SCENES_DATA || SCENES_DATA;
    BIOMES.forEach(b => {
      const chip = document.createElement('button');
      chip.dataset.biome = b.key;
      const count = b.key === 'all' ? currentScenes.length : currentScenes.filter(s => s.biome === b.key).length;
      chip.textContent = b.key === 'all' ? `${b.emoji} ${b.label}` : `${b.emoji} ${b.label} (${count})`;
      chip.className = 'biome-chip' + (b.key === activeFilter ? ' active' : '');
      chip.onclick = () => setFilter(b.key);
      biomeFilterEl.appendChild(chip);
    });
    // 若有搜尋結果，加入「搜尋結果」快捷 chip
    if (currentScenes.some(s => s.isSearchResult)) {
      const searchChip = document.createElement('button');
      searchChip.className = 'biome-chip search-active';
      searchChip.textContent = '🔍 搜尋結果';
      searchChip.onclick = () => {
        // 只顯示搜尋結果
        filteredIndices = currentScenes.reduce((acc, s, i) => { if (s.isSearchResult) acc.push(i); return acc; }, []);
        document.querySelectorAll('.biome-chip').forEach(c => c.classList.remove('active'));
        searchChip.classList.add('active');
        currentPos = 0;
        rebuildDots();
        renderSlide(false);
      };
      biomeFilterEl.appendChild(searchChip);
    }
  }

  // ── 啟動 ──
  window._baseScenes = SCENES_DATA.slice();
  setFilter('all');
  startAuto();
  startRandomPush();
</script>
</body>
</html>
